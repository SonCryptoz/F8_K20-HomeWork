<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Exercise 1</title>

        <style>
            /* Base */
            body {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family:
                    system-ui,
                    -apple-system,
                    BlinkMacSystemFont,
                    "Segoe UI",
                    Roboto,
                    Oxygen,
                    Ubuntu,
                    Cantarell,
                    "Open Sans",
                    "Helvetica Neue",
                    sans-serif;
            }

            .box {
                width: 100%;
                max-width: 800px;
                margin: 0 auto;
                display: flex;
                flex-direction: column;
                align-items: center;
            }

            .box .square {
                width: 500px;
                height: 500px;
                border: 10px solid rgb(0, 0, 0);
                position: relative;

                /* Arrow icon */
                .arrow {
                    position: absolute;
                    top: -1%;
                    left: 0;
                    width: 14px;
                    height: 14px;
                    padding: 2px;
                    border: 10px solid #04d1ff;
                    border-left: 0;
                    border-bottom: 0;
                    transform: translate(-50%, -50%) rotate(45deg);
                    animation: fly_around 10s linear infinite;
                }

                .arrow::after {
                    content: "";
                    position: absolute;
                    top: 50%;
                    left: 50%;
                    width: 40px;
                    height: 10px;
                    background-color: #04d1ff;
                    transform: translate(-50%, -50%) rotate(-45deg);
                }
            }

            /* Animation */
            @keyframes fly_around {
                /* 1. Cạnh trên: Đi từ trái sang phải */
                0% {
                    top: -1%;
                    left: 0;
                    transform: translate(-50%, -50%) rotate(45deg);
                }
                24.9% {
                    top: -1%;
                    left: 101%;
                    transform: translate(-50%, -50%) rotate(45deg);
                }

                /* 2. Cạnh phải: Đi từ trên xuống dưới */
                25% {
                    top: -1%;
                    left: 101%;
                    transform: translate(-50%, -50%) rotate(135deg);
                }
                49.9% {
                    top: 101%;
                    left: 101%;
                    transform: translate(-50%, -50%) rotate(135deg);
                }

                /* 3. Cạnh dưới: Đi từ phải sang trái */
                50% {
                    top: 101%;
                    left: 101%;
                    transform: translate(-50%, -50%) rotate(225deg);
                }
                74.9% {
                    top: 101%;
                    left: -1%;
                    transform: translate(-50%, -50%) rotate(225deg);
                }

                /* 4. Cạnh trái: Đi từ dưới lên trên */
                75% {
                    top: 101%;
                    left: -1%;
                    transform: translate(-50%, -50%) rotate(315deg);
                }

                100% {
                    top: -1%;
                    left: -1%;
                    transform: translate(-50%, -50%) rotate(315deg);
                }
            }
        </style>
    </head>
    <body>
        <div class="box">
            <h1>Animation 1</h1>
            <div class="square">
                <div class="arrow"></div>
            </div>
        </div>
    </body>
</html>
